<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRABHAVA SYSTEMS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family:Inter; margin:0; background:#f5f7fb;}
.container {max-width:1000px; margin:auto; padding:20px;}

.hero {display:flex; justify-content:space-between; align-items:center;}
.aqi-box {background:white; padding:20px; border-radius:10px;}
.aqi-value {font-size:40px; font-weight:bold;}
.good{color:#16a34a;}
.moderate{color:#f59e0b;}
.bad{color:#dc2626;}

.grid {display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:20px;}
.card {background:white; padding:15px; border-radius:10px;}

.chart-box {margin-top:30px; background:white; padding:20px; border-radius:10px;}
</style>
</head>

<body>

<div class="container">

<h2>Live Air Quality</h2>

<div class="hero">
  <div>
    <h3>Current AQI</h3>
    <div id="aqi" class="aqi-value">--</div>
    <div id="status">--</div>
  </div>
</div>

<div class="grid">
  <div class="card">PM2.5: <span id="pm25">--</span></div>
  <div class="card">PM10: <span id="pm10">--</span></div>
  <div class="card">NO2: <span id="no2">--</span></div>
  <div class="card">O3: <span id="o3">--</span></div>
</div>

<div class="chart-box">
  <canvas id="chart"></canvas>
</div>

</div>

<script>

// 📍 location (only once)
async function getLocation(){
  const saved = localStorage.getItem("coords");
  if(saved) return JSON.parse(saved);

  return new Promise((resolve)=>{
    navigator.geolocation.getCurrentPosition(pos=>{
      const c = {
        lat: pos.coords.latitude,
        lon: pos.coords.longitude
      };
      localStorage.setItem("coords", JSON.stringify(c));
      resolve(c);
    });
  });
}

// 📊 chart
const chart = new Chart(document.getElementById("chart"), {
  type:"line",
  data:{
    labels:[],
    datasets:[{
      data:[],
      borderColor:"#2563eb",
      backgroundColor:"rgba(37,99,235,0.1)",
      fill:true,
      tension:0.4,
      pointRadius:0
    }]
  },
  options:{
    plugins:{legend:{display:false}}
  }
});

// status
function getStatus(aqi){
  if(aqi<=50) return ["Good","good"];
  if(aqi<=100) return ["Moderate","moderate"];
  return ["Unhealthy","bad"];
}

// 🔥 fetch AQI (WAQI API)
async function load(){
  const {lat,lon} = await getLocation();

  const res = await fetch(`https://api.waqi.info/feed/geo:${lat};${lon}/?token=demo`);
  const data = await res.json();

  if(!data.data) return;

  const d = data.data.iaqi;

  const pm25 = d.pm25?.v || 0;
  const pm10 = d.pm10?.v || 0;
  const no2 = d.no2?.v || 0;
  const o3 = d.o3?.v || 0;
  const aqi = data.data.aqi;

  document.getElementById("pm25").innerText = pm25;
  document.getElementById("pm10").innerText = pm10;
  document.getElementById("no2").innerText = no2;
  document.getElementById("o3").innerText = o3;

  const [status,cls] = getStatus(aqi);

  const aqiEl = document.getElementById("aqi");
  aqiEl.innerText = aqi;
  aqiEl.className = "aqi-value " + cls;

  document.getElementById("status").innerText = status;

  const t = new Date().toLocaleTimeString();

  chart.data.labels.push(t);
  chart.data.datasets[0].data.push(aqi);

  if(chart.data.labels.length>12){
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.update();
}

// auto refresh
load();
setInterval(load,10000);

</script>

</body>
</html>
