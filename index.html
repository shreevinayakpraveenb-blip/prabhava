<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRABHAVA SYSTEMS | Smart Air Quality Monitoring</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="container nav-container">
        <div class="logo">
            <img src="logo.png" class="logo-img">
        </div>
        <ul class="nav-menu">
            <li><a href="#home" class="nav-link active">Home</a></li>
            <li><a href="#about" class="nav-link">About</a></li>
            <li><a href="#platform" class="nav-link">Platform</a></li>
            <li><a href="#dashboard" class="nav-link">Dashboard</a></li>
            <li><a href="team.html" class="nav-link">Team</a></li>
        </ul>
    </div>
</nav>

<!-- HERO -->
<section class="hero" id="home">
    <div class="container hero-container">

        <div class="hero-content">
            <h1>Smart Air Quality Monitoring for Healthier Cities</h1>
            <p>Advanced real-time environmental data for sustainable urban living.</p>

            <div class="hero-buttons">
                <a href="signup.html" class="btn btn-primary">Get Started</a>
                <a href="login.html" class="btn btn-outline">Log In</a>
            </div>
        </div>

        <div class="hero-image">
            <div class="product-mockup">

                <div class="aqi-display">
                    <span class="aqi-label">AQI Index</span>

                    <span class="aqi-value" id="live-aqi-value">--</span>

                    <span class="aqi-status" id="live-aqi-status">Loading...</span>

                    <span id="live-city" style="font-size:14px; color:#666;"></span>
                </div>

            </div>
        </div>

    </div>
</section>

<!-- DASHBOARD PREVIEW -->
<section id="dashboard">
    <div class="container">
        <canvas id="aqiChart"></canvas>
    </div>
</section>

<script>

// 🌍 REAL AQI + CITY
navigator.geolocation.getCurrentPosition(async (pos)=>{

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    try {

        const res = await fetch(
            `https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=38659b644448994cb2e78005cd7cbb1d`
        );

        const data = await res.json();

        const pm = data.list[0].components.pm2_5;

        let aqi = Math.round((pm/35.4)*100);

        let status = "Good";
        let color = "#22c55e";

        if(aqi > 50){ status = "Moderate"; color = "#facc15"; }
        if(aqi > 100){ status = "Unhealthy"; color = "#ef4444"; }

        document.getElementById("live-aqi-value").innerText = aqi;
        document.getElementById("live-aqi-value").style.color = color;
        document.getElementById("live-aqi-status").innerText = status;

        // CITY
        const geo = await fetch(
            `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}`
        );

        const g = await geo.json();

        document.getElementById("live-city").innerText =
            "📍 " + (g.city || g.locality || g.principalSubdivision);

    } catch(e) {
        document.getElementById("live-aqi-status").innerText = "Error";
    }

});

// 📊 GRAPH
new Chart(document.getElementById("aqiChart"), {
    type: "line",
    data: {
        labels: ["12AM","4AM","8AM","12PM","4PM","8PM"],
        datasets: [{
            label: "AQI Trend",
            data: [60,80,120,100,90,85],
            borderColor: "#2563eb",
            fill: true
        }]
    }
});

</script>

</body>
</html>
