<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#f5f7fb;
}

.container {
    padding:20px;
    max-width:900px;
    margin:auto;
}

.card {
    background:white;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.big {grid-column:span 2;}

.aqi {
    font-size:40px;
    font-weight:bold;
    transition:0.3s;
}

.good {color:#16a34a;}
.moderate {color:#f59e0b;}
.bad {color:#dc2626;}

#status {
    margin-top:5px;
    font-size:14px;
    color:#555;
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h3>AQI</h3>
        <div id="aqi" class="aqi">--</div>
        <div id="status">--</div>
    </div>

    <div class="grid">
        <div class="card"><h4>PM2.5</h4><div id="pm25">--</div></div>
        <div class="card"><h4>PM10</h4><div id="pm10">--</div></div>
        <div class="card"><h4>NO2</h4><div id="no2">--</div></div>
        <div class="card"><h4>O3</h4><div id="o3">--</div></div>

        <div class="card big">
            <canvas id="chart"></canvas>
        </div>
    </div>

</div>

<script>

// ===== CHART INIT =====
const ctx = document.getElementById("chart").getContext("2d");

const chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "AQI",
            data: [],
            borderColor: "#2563eb",
            borderWidth: 2,
            tension: 0.4
        }]
    },
    options: {
        animation: false,
        scales: {
            y: {
                beginAtZero: false
            }
        }
    }
});

// ===== AQI STATUS =====
function getStatus(aqi){
    if(aqi <= 50) return ["Good","good"];
    if(aqi <= 100) return ["Moderate","moderate"];
    return ["Unhealthy","bad"];
}

// ===== FETCH DATA =====
async function loadAQI(){

    try {
        const lat = 28.6139;
        const lon = 77.2090;

        const res = await fetch(
            `https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=38659b644448994cb2e78005cd7cbb1d`
        );

        const data = await res.json();

        if(!data.list){
            console.log("API error:", data);
            return;
        }

        const c = data.list[0].components;

        // ===== UPDATE VALUES =====
        document.getElementById("pm25").innerText = c.pm2_5 ?? "--";
        document.getElementById("pm10").innerText = c.pm10 ?? "--";
        document.getElementById("no2").innerText = c.no2 ?? "--";
        document.getElementById("o3").innerText = c.o3 ?? "--";

        // ===== AQI CALC =====
        const aqi = Math.round((c.pm2_5 / 35.4) * 100);

        const [status, cls] = getStatus(aqi);

        const aqiEl = document.getElementById("aqi");
        aqiEl.innerText = aqi;
        aqiEl.className = "aqi " + cls;

        document.getElementById("status").innerText = status;

        // ===== CHART UPDATE =====
        const time = new Date().toLocaleTimeString();

        chart.data.labels.push(time);
        chart.data.datasets[0].data.push(aqi);

        // keep last 10 points
        if(chart.data.labels.length > 10){
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
        }

        chart.update();

    } catch (err) {
        console.log("ERROR:", err);
    }
}

// ===== AUTO REFRESH =====
loadAQI();
setInterval(loadAQI, 10000);

</script>

</body>
</html>
