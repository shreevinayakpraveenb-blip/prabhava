<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; padding:20px;">

<h1 id="welcome-user">Loading...</h1>

<h2>AQI: <span id="dash-aqi">--</span></h2>
<h3 id="aqi-status">--</h3>
<p id="aqi-city">Detecting location...</p>

<button onclick="auth.signOut()">Logout</button>

<script src="auth.js"></script>

<script>

// 🔐 Auth Check
async function checkAuth() {
    const user = await auth.getUser();

    if (!user) {
        window.location.href = "login.html";
        return;
    }

    document.getElementById("welcome-user").innerText =
        "Hello " + (user.user_metadata?.full_name || user.email);
}

checkAuth();


// 🔥 MAIN AQI FUNCTION
async function loadAQI() {

    if (!navigator.geolocation) {
        alert("Location not supported ❌");
        return;
    }

    navigator.geolocation.getCurrentPosition(async (pos) => {

        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        // 🌫️ AQI API
        const res = await fetch(
            `https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=38659b644448994cb2e78005cd7cbb1d`
        );

        const data = await res.json();

        const pm25 = data.list[0].components.pm2_5;

        // 🔥 REAL AQI CALCULATION
        function calculateAQI(pm) {
            if (pm <= 12) return Math.round((50/12)*pm);
            if (pm <= 35.4) return Math.round(((100-51)/(35.4-12))*(pm-12)+51);
            if (pm <= 55.4) return Math.round(((150-101)/(55.4-35.4))*(pm-35.4)+101);
            if (pm <= 150.4) return Math.round(((200-151)/(150.4-55.4))*(pm-55.4)+151);
            if (pm <= 250.4) return Math.round(((300-201)/(250.4-150.4))*(pm-150.4)+201);
            return 400;
        }

        const aqi = calculateAQI(pm25);

        document.getElementById("dash-aqi").innerText = aqi;

        // 📍 CITY NAME
        const geo = await fetch(
            `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=en`
        );

        const geoData = await geo.json();
        const city = geoData.city || geoData.locality || geoData.principalSubdivision;

        document.getElementById("aqi-city").innerText = "📍 " + city;

        // 🎨 STATUS + COLOR
        let status = "Good";
        let color = "green";

        if (aqi > 50) { status = "Moderate"; color = "orange"; }
        if (aqi > 100) { status = "Unhealthy"; color = "red"; }
        if (aqi > 200) { status = "Very Unhealthy"; color = "purple"; }

        document.getElementById("aqi-status").innerText = status;
        document.getElementById("dash-aqi").style.color = color;

    }, () => {
        alert("Location allow karo ❌");
    });
}

loadAQI();

</script>

</body>
</html>
