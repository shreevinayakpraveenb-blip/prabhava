<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background:#f5f7fb;
    color:#111827;
}

.container {
    padding:20px;
}

.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.card {
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
    margin-top:20px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(2,1fr);
    gap:15px;
}

.big {
    grid-column: span 2;
}

.aqi {
    font-size:48px;
    font-weight:bold;
}

.good {color:#22c55e;}
.moderate {color:#facc15;}
.bad {color:#ef4444;}

button {
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2 id="welcome-user">Loading...</h2>
        <button onclick="auth.signOut()">Logout</button>
    </div>

    <!-- AQI MAIN -->
    <div class="card">
        <h3>AQI Index</h3>
        <div id="aqi" class="aqi">--</div>
        <div id="status"></div>
        <div id="city"></div>
    </div>

    <!-- POLLUTANTS -->
    <div class="grid">

        <div class="card">
            <h4>PM2.5</h4>
            <div id="pm25">--</div>
        </div>

        <div class="card">
            <h4>PM10</h4>
            <div id="pm10">--</div>
        </div>

        <div class="card">
            <h4>NO2</h4>
            <div id="no2">--</div>
        </div>

        <div class="card">
            <h4>O3</h4>
            <div id="o3">--</div>
        </div>

        <div class="card big">
            <canvas id="chart"></canvas>
        </div>

    </div>

</div>

<script src="auth.js"></script>

<script>

// Auth
async function checkAuth(){
    const user = await auth.getUser();
    if(!user) window.location.href="login.html";

    document.getElementById("welcome-user").innerText =
        "Hello, " + (user.user_metadata?.full_name || user.email);
}
checkAuth();

// AQI
navigator.geolocation.getCurrentPosition(async (pos)=>{

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const res = await fetch(
        `https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=38659b644448994cb2e78005cd7cbb1d`
    );

    const data = await res.json();
    const c = data.list[0].components;

    document.getElementById("pm25").innerText = c.pm2_5;
    document.getElementById("pm10").innerText = c.pm10;
    document.getElementById("no2").innerText = c.no2;
    document.getElementById("o3").innerText = c.o3;

    const aqi = Math.round((c.pm2_5/35.4)*100);

    let status="Good", cls="good";
    if(aqi>50){status="Moderate";cls="moderate";}
    if(aqi>100){status="Unhealthy";cls="bad";}

    document.getElementById("aqi").innerText = aqi;
    document.getElementById("aqi").className="aqi "+cls;
    document.getElementById("status").innerText=status;

    // City
    const geo = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}`);
    const g = await geo.json();
    document.getElementById("city").innerText = "📍 "+(g.city || g.locality);

});

// Chart
new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
        labels:["12AM","4AM","8AM","12PM","4PM","8PM"],
        datasets:[{
            data:[60,80,120,100,90,85],
            borderColor:"#2563eb",
            fill:true
        }]
    }
});

</script>

</body>
</html>
