<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
}

/* Sidebar */
.sidebar {
    width:220px;
    background:#020617;
    padding:20px;
    height:100vh;
}

.sidebar h2 {
    color:#22c55e;
}

.sidebar a {
    display:block;
    margin:15px 0;
    color:#94a3b8;
    text-decoration:none;
}

/* Main */
.main {
    flex:1;
    padding:20px;
}

.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* Cards */
.grid {
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:15px;
    margin-top:20px;
}

.card {
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

.big {
    grid-column: span 2;
}

.aqi {
    font-size:40px;
    font-weight:bold;
}

.good {color:#22c55e;}
.moderate {color:#facc15;}
.bad {color:#ef4444;}
.verybad {color:#a855f7;}

button {
    background:red;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    color:white;
}

canvas {
    height:250px !important;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>PRABHAVA</h2>
    <a href="#">Dashboard</a>
    <a href="#">Analytics</a>
    <a href="#">Devices</a>
    <a href="#">Alerts</a>
</div>

<!-- Main -->
<div class="main">

    <div class="header">
        <h2 id="welcome-user">Loading...</h2>
        <button onclick="auth.signOut()">Logout</button>
    </div>

    <!-- Cards -->
    <div class="grid">

        <!-- AQI -->
        <div class="card">
            <h3>AQI</h3>
            <div id="aqi" class="aqi">--</div>
            <div id="status"></div>
            <div id="city"></div>
        </div>

        <!-- PM2.5 -->
        <div class="card">
            <h3>PM2.5</h3>
            <div id="pm25">--</div>
        </div>

        <!-- PM10 -->
        <div class="card">
            <h3>PM10</h3>
            <div id="pm10">--</div>
        </div>

        <!-- NO2 -->
        <div class="card">
            <h3>NO2</h3>
            <div id="no2">--</div>
        </div>

        <!-- O3 -->
        <div class="card">
            <h3>O3</h3>
            <div id="o3">--</div>
        </div>

        <!-- CO -->
        <div class="card">
            <h3>CO</h3>
            <div id="co">--</div>
        </div>

        <!-- Chart -->
        <div class="card big">
            <h3>Pollution Trend</h3>
            <canvas id="chart"></canvas>
        </div>

    </div>

</div>

<script src="auth.js"></script>

<script>

// Auth
async function checkAuth(){
    const user = await auth.getUser();
    if(!user) window.location.href="login.html";

    document.getElementById("welcome-user").innerText =
        "Hello, " + (user.user_metadata?.full_name || user.email);
}
checkAuth();

// AQI + DATA
navigator.geolocation.getCurrentPosition(async (pos)=>{

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const res = await fetch(
        `https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=38659b644448994cb2e78005cd7cbb1d`
    );
    const data = await res.json();

    const c = data.list[0].components;

    document.getElementById("pm25").innerText = c.pm2_5;
    document.getElementById("pm10").innerText = c.pm10;
    document.getElementById("no2").innerText = c.no2;
    document.getElementById("o3").innerText = c.o3;
    document.getElementById("co").innerText = c.co;

    const aqi = Math.round((c.pm2_5/35.4)*100);
    const aqiBox = document.getElementById("aqi");

    let status="Good", cls="good";
    if(aqi>50){status="Moderate";cls="moderate";}
    if(aqi>100){status="Unhealthy";cls="bad";}
    if(aqi>200){status="Very Unhealthy";cls="verybad";}

    aqiBox.innerText = aqi;
    aqiBox.className="aqi "+cls;
    document.getElementById("status").innerText=status;

    // City
    const geo = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}`);
    const g = await geo.json();
    document.getElementById("city").innerText = "📍 "+(g.city || g.locality);

});

// Chart
new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
        labels:["12AM","4AM","8AM","12PM","4PM","8PM"],
        datasets:[{
            label:"AQI Trend",
            data:[80,90,120,110,100,95],
            borderColor:"#22c55e",
            fill:true
        }]
    }
});

</script>

</body>
</html>
