<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Prabhava Systems</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- 🔥 CDN FIX -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dashboard-page">
    <div class="dashboard-layout">
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="logo.png" height="40">
            </div>

            <nav class="sidebar-nav">
                <a class="nav-item active">Overview</a>
            </nav>

            <div class="sidebar-footer">
                <button onclick="auth.signOut()">Logout</button>
            </div>
        </aside>

        <!-- Main -->
        <main class="main-content">
            <h1 id="welcome-user">Hello User</h1>

            <div class="metrics-grid">
                <div class="metric-card">
                    <h3>AQI</h3>
                    <h2 id="dash-aqi">Loading...</h2>
                    <p id="aqi-status">--</p>
                    <p id="aqi-city">Detecting...</p>
                </div>
            </div>

            <canvas id="dashboardChart"></canvas>
        </main>
    </div>

    <script src="auth.js"></script>

    <script>
        // 🔐 Auth check
        async function checkAuth() {
            const user = await auth.getUser();
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            const name = user.user_metadata?.full_name || user.email;
            document.getElementById("welcome-user").innerText = "Hello " + name;
        }

        checkAuth();

        // 🌍 GPS AQI
        async function loadAQI() {
            if (!navigator.geolocation) {
                alert("Location not supported ❌");
                return;
            }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                try {
                    const res = await fetch(
                        `https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=38659b644448994cb2e78005cd7cbb1d`
                    );

                    const data = await res.json();
                    const aqi = data.list[0].main.aqi;

                    document.getElementById("dash-aqi").innerText = aqi;
                    document.getElementById("aqi-city").innerText = "📍 Your Location";

                    let status = "Good";
                    let color = "green";

                    if (aqi >= 4) { status = "Poor"; color = "red"; }
                    else if (aqi == 3) { status = "Moderate"; color = "orange"; }

                    document.getElementById("aqi-status").innerText = status;
                    document.getElementById("dash-aqi").style.color = color;

                } catch (err) {
                    document.getElementById("dash-aqi").innerText = "Error ❌";
                }

            }, () => {
                alert("Location allow karo ❌");
            });
        }

        loadAQI();

        // Chart
        const ctx = document.getElementById('dashboardChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['12am','4am','8am','12pm','4pm','8pm'],
                datasets: [{
                    data: [35,38,65,52,48,42],
                    borderColor: '#22C55E',
                    fill: true
                }]
            }
        });
    </script>
</body>
</html>
