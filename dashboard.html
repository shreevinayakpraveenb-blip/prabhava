<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#f5f7fb;
}

.container {
    padding:20px;
    max-width:900px;
    margin:auto;
}

.card {
    background:white;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.big {grid-column:span 2;}

.aqi {
    font-size:40px;
    font-weight:bold;
}

.good {color:green;}
.moderate {color:orange;}
.bad {color:red;}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h3>AQI</h3>
        <div id="aqi" class="aqi">--</div>
        <div id="status"></div>
    </div>

    <div class="grid">
        <div class="card"><h4>PM2.5</h4><div id="pm25">--</div></div>
        <div class="card"><h4>PM10</h4><div id="pm10">--</div></div>
        <div class="card"><h4>NO2</h4><div id="no2">--</div></div>
        <div class="card"><h4>O3</h4><div id="o3">--</div></div>

        <div class="card big">
            <canvas id="chart"></canvas>
        </div>
    </div>

</div>

<script>

// -------- CHART --------
let chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            data: [],
            borderColor: "#2563eb",
            fill: false
        }]
    }
});

// -------- FETCH DATA --------
async function loadAQI(){

    try {
        const lat = 28.6139; // Delhi fixed
        const lon = 77.2090;

        const res = await fetch(
            `https://api.openweathermap.org/data/2.5/air_pollution?lat=${lat}&lon=${lon}&appid=38659b644448994cb2e78005cd7cbb1d`
        );

        const data = await res.json();

        if(!data.list){
            console.log("API error", data);
            return;
        }

        const c = data.list[0].components;

        // update values
        document.getElementById("pm25").innerText = c.pm2_5;
        document.getElementById("pm10").innerText = c.pm10;
        document.getElementById("no2").innerText = c.no2;
        document.getElementById("o3").innerText = c.o3;

        // AQI
        const aqi = Math.round((c.pm2_5/35.4)*100);

        let status="Good", cls="good";
        if(aqi>50){status="Moderate";cls="moderate";}
        if(aqi>100){status="Unhealthy";cls="bad";}

        const aqiEl = document.getElementById("aqi");
        aqiEl.innerText = aqi;
        aqiEl.className = "aqi " + cls;

        document.getElementById("status").innerText = status;

        // chart update
        const time = new Date().toLocaleTimeString();

        chart.data.labels.push(time);
        chart.data.datasets[0].data.push(aqi);

        if(chart.data.labels.length > 10){
            chart.data.labels.shift();
            chart.data.datasets[0].data.shift();
        }

        chart.update();

    } catch (err) {
        console.log("ERROR:", err);
    }
}

// -------- AUTO REFRESH --------
loadAQI();
setInterval(loadAQI, 10000);

</script>

</body>
</html>
