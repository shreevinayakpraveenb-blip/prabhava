<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Prabhava Systems</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">
    <div class="auth-card animate-up">
        <div class="auth-header">
            <h1>Create Account</h1>
            <p>Join Prabhava Systems today</p>
        </div>
        
        <form id="signup-form" class="auth-form">
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@company.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required minlength="6">
            </div>
            <button type="submit" class="btn btn-cta btn-block" id="signup-btn">
                <span>Sign Up</span>
            </button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Log In</a></p>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

            const { data, error } = await auth.signUp(email, password, fullName);

            if (error) {
                showToast(error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<span>Sign Up</span>';
            } else {
                showToast('Signup successful! Please check your email for verification.');
                setTimeout(() => window.location.href = 'login.html', 2000);
            }
        });
    </script>
</body>
</html>
